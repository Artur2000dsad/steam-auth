# Пример nginx для SABR RUST
# Путь проекта на сервере: /opt/steam-auth/app

# Редирект HTTP -> HTTPS
server {
    listen 80;
    server_name sabrrust.online www.sabrrust.online cdn.sabrrust.online auth.sabrrust.online;
    return 301 https://$host$request_uri;
}

# Основной сайт
server {
    listen 443 ssl http2;
    server_name sabrrust.online www.sabrrust.online;

    ssl_certificate     /etc/letsencrypt/live/sabrrust.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sabrrust.online/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:5001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# CDN API
server {
    listen 443 ssl http2;
    server_name cdn.sabrrust.online;

    ssl_certificate     /etc/letsencrypt/live/sabrrust.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sabrrust.online/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:5001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# Steam Auth
server {
    listen 443 ssl http2;
    server_name auth.sabrrust.online;

    ssl_certificate     /etc/letsencrypt/live/sabrrust.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sabrrust.online/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
